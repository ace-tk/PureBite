name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: backend
      - name: Run Linter
        run: npm run lint
        working-directory: backend
        continue-on-error: false
      - name: Run Tests
        run: npm test
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: temp-app/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: temp-app
      - name: Run Linter
        run: npm run lint
        working-directory: temp-app
      - name: Run Unit Tests
        run: npm test
        working-directory: temp-app
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: temp-app
      - name: Run E2E Tests
        run: npm run test:e2e
        working-directory: temp-app
